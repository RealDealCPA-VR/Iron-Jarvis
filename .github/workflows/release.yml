name: Release

# Builds the self-contained Windows installer and publishes it to GitHub
# Releases — ONLY when you push a version tag (e.g. `git tag v0.1.0 && git push
# --tags`). Nothing is published on a normal push. The packaged app then
# auto-updates from these releases via electron-updater.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release + upload the installer

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Sync Python deps (creates .venv with pyinstaller)
        run: uv sync --extra dev

      - name: Build + publish the installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: powershell -ExecutionPolicy Bypass -File desktop/build-installer.ps1 -Publish
